name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zig:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: mlugg/setup-zig@v1
        with:
          version: "0.16.0"
      - run: zig build
      - run: zig build test
