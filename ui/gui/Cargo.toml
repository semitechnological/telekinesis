[package]
name = "telekinesis-gui"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "telekinesis-gui"
path = "src/main.rs"

[dependencies]
crepuscularity-gpui = { version = "0.5", features = ["macos", "symbols"] }
crepuscularity-core = "0.4"
crepuscularity-runtime = "0.4"
crepuscularity_macros = "0.5.6"
gpui = "=0.2.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
